<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Swiped By | Technology Boutique</title>
    <style>
      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f8f8f8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }
      
      #loader-wrapper.loaded {
        opacity: 0;
        visibility: hidden;
      }

      .phone-loader {
        width: 60px;
        height: 120px;
        border: 3px solid #000000;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        animation: float 3s ease-in-out infinite;
      }

      .phone-loader::before {
        content: '';
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 8px;
        background: #000000;
        border-radius: 4px;
        z-index: 2;
      }

      .scan-line {
        position: absolute;
        top: -10%;
        left: 0;
        width: 100%;
        height: 20%;
        background: linear-gradient(to bottom, transparent, #007AFF, transparent);
        opacity: 0.5;
        animation: scan 2s linear infinite;
      }

      .loading-bar {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 70%;
        height: 4px;
        background: #f0f0f0;
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-progress {
        width: 100%;
        height: 100%;
        background: #007AFF;
        transform: translateX(-100%);
        animation: progress 2s infinite ease-in-out;
      }

      @keyframes scan {
        0% { top: -20%; }
        100% { top: 120%; }
      }

      @keyframes progress {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(0); }
        100% { transform: translateX(100%); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .loader-text {
        margin-top: 40px;
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
        font-size: 11px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: #000000;
        font-weight: 800;
        animation: breathe 2s infinite ease-in-out;
      }

      @keyframes breathe {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="loader-wrapper">
      <div class="phone-loader">
        <div class="scan-line"></div>
        <div class="loading-bar">
          <div class="loading-progress"></div>
        </div>
      </div>
      <div class="loader-text">Swiping In</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
